<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TUF Agency — Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', sans-serif; background-color: #0a0c14; }
  .card { background-color: #111520; border: 1px solid #1e2336; }
  input { background-color: #0f1321 !important; border: 1px solid #1e2336 !important; color: white !important; transition: border-color 0.2s; }
  input:focus { outline: none !important; border-color: #e53e3e !important; }
  input::placeholder { color: #3a4060 !important; }
  .btn-login { background: linear-gradient(135deg, #c53030, #e53e3e); transition: all 0.2s; }
  .btn-login:hover { background: linear-gradient(135deg, #e53e3e, #fc8181); transform: translateY(-1px); box-shadow: 0 8px 25px rgba(229,62,62,0.25); }
  .noise { position: fixed; inset: 0; pointer-events: none; opacity: 0.025; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); background-size: 128px; }
  @keyframes fadeUp { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform: translateY(0); } }
  .fade-up { animation: fadeUp 0.5s ease forwards; }
  .fade-up-2 { animation: fadeUp 0.5s 0.1s ease both; }
  .fade-up-3 { animation: fadeUp 0.5s 0.2s ease both; }
  .glow { position: absolute; top: -120px; left: 50%; transform: translateX(-50%); width: 400px; height: 400px; background: radial-gradient(circle, rgba(229,62,62,0.06) 0%, transparent 70%); pointer-events: none; border-radius: 50%; }
  #msg-erro { display: none; }
</style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
<div class="noise"></div>

<div class="card w-full max-w-md p-8 rounded-2xl shadow-2xl relative overflow-visible">
  <div class="glow"></div>

  <div class="flex flex-col items-center mb-8 fade-up">
    <img src="icons/tuf.png" alt="TUF Agency" class="h-14 w-auto mb-5 drop-shadow-lg">
    <p class="text-gray-500 text-sm tracking-wide">Acesse sua conta para ver seus resultados</p>
  </div>

  <div class="space-y-5 fade-up-2">
    <div>
      <label class="block text-gray-400 text-xs font-semibold mb-2 uppercase tracking-widest">Usuário ou E-mail</label>
      <input type="text" id="user" placeholder="seu@email.com" class="w-full rounded-lg px-4 py-3 text-sm">
    </div>
    <div>
      <label class="block text-gray-400 text-xs font-semibold mb-2 uppercase tracking-widest">Senha</label>
      <input type="password" id="pass" placeholder="••••••••" class="w-full rounded-lg px-4 py-3 text-sm"
        onkeydown="if(event.key==='Enter') realizarLogin()">
    </div>

    <div id="msg-erro" class="text-red-400 text-xs text-center font-semibold bg-red-900/20 border border-red-900/40 rounded-lg px-4 py-3"></div>

    <button onclick="realizarLogin()" id="btn-entrar"
      class="btn-login w-full text-white font-bold py-3 rounded-lg text-sm uppercase tracking-widest shadow-lg">
      Entrar no Painel
    </button>
  </div>

  <div class="mt-8 text-center border-t border-[#1e2336] pt-6 fade-up-3">
    <p class="text-gray-600 text-xs">© 2026 TUF Agency · Influencer Management</p>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDcwuASd8wGkR9is1uFQwRjJKbatYE_wD0",
  authDomain: "tuf-v4.firebaseapp.com",
  databaseURL: "https://tuf-v4-default-rtdb.firebaseio.com",
  projectId: "tuf-v4",
  storageBucket: "tuf-v4.firebasestorage.app",
  messagingSenderId: "108777866240",
  appId: "1:108777866240:web:803141d1a15373223b44e5"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function mostrarErro(msg) {
  const el = document.getElementById('msg-erro');
  el.textContent = msg;
  el.style.display = 'block';
}

function realizarLogin() {
  const rawUser = document.getElementById('user').value.toLowerCase().trim();
  const p = document.getElementById('pass').value;
  const btn = document.getElementById('btn-entrar');
  document.getElementById('msg-erro').style.display = 'none';

  if (!rawUser || !p) { mostrarErro('Preencha todos os campos.'); return; }

  // Admin shortcut
  if (rawUser === 'admin' && p === 'tuf2026') {
    sessionStorage.setItem('adminLogado', 'true');
    window.location.href = 'admin.html';
    return;
  }

  btn.textContent = 'Verificando...';
  btn.disabled = true;

  const u = rawUser.replace(/\./g, '_').replace(/@/g, '_at_');
  db.ref('usuarios/' + u).once('value', s => {
    const d = s.val();
    if (d && d.senha === p) {
      localStorage.setItem('usuarioLogado', u);
      window.location.href = 'dashboard.html';
    } else {
      mostrarErro('Usuário ou senha incorretos.');
      btn.textContent = 'Entrar no Painel';
      btn.disabled = false;
    }
  });
}
</script>
</body>
</html>
