<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>TUF ADMIN | GESTÃO DE ELITE v4.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --tuf-red: #E20613; --tuf-black: #000000; }
        body { background-color: #FFFFFF; color: var(--tuf-black); font-family: 'Inter', sans-serif; letter-spacing: -0.5px; }
        .tuf-title { font-weight: 900; font-style: italic; text-transform: uppercase; letter-spacing: -1.5px; }
        .sidebar { background-color: #F8F8F8; border-right: 4px solid var(--tuf-black); min-height: 100vh; position: sticky; top: 0; }
        .tuf-input { border: 3px solid var(--tuf-black); border-radius: 0px; padding: 12px; width: 100%; font-weight: 900; text-transform: uppercase; background: white; }
        .tuf-input:focus { outline: none; box-shadow: 6px 6px 0px var(--tuf-red); }
        .btn-tuf { background-color: var(--tuf-red); color: white; font-weight: 900; font-style: italic; text-transform: uppercase; padding: 18px; border-radius: 0px; border: 3px solid var(--tuf-black); box-shadow: 4px 4px 0px var(--tuf-black); cursor: pointer; transition: 0.1s; }
        .btn-tuf:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px var(--tuf-black); }
        .tab-active { background-color: var(--tuf-red) !important; color: white !important; border-left: 8px solid var(--tuf-black); }
        .card-admin { border: 4px solid var(--tuf-black); border-radius: 0px; box-shadow: 10px 10px 0px var(--tuf-black); background: white; }
        #login-screen { background-color: #FFF; position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .main-content { min-height: 100vh; }
    </style>
</head>
<body class="flex">

    <div id="login-screen">
        <div class="w-full max-w-sm p-10 border-[6px] border-black shadow-[15px_15px_0px_#E20613]">
            <img src="icons/tuf.png" class="h-20 mx-auto mb-8">
            <div class="space-y-4">
                <input type="password" id="admin-pass-input" class="tuf-input text-center" placeholder="SENHA MESTRA">
                <button onclick="authAdmin()" class="w-full btn-tuf italic">ACESSAR PAINEL</button>
            </div>
        </div>
    </div>

    <aside class="w-80 sidebar p-6 hidden md:flex flex-col">
        <img src="icons/tuf.png" class="h-14 mb-10 mx-auto">
        <nav class="space-y-2 flex-1">
            <button onclick="mudarTab('lancar')" id="btn-lancar" class="flex items-center w-full p-4 font-black italic text-xs tab-active uppercase"><i data-lucide="plus-circle" class="mr-3"></i> LANÇAR VALORES</button>
            <button onclick="mudarTab('historico')" id="btn-historico" class="flex items-center w-full p-4 font-black italic text-xs hover:bg-gray-200 transition uppercase"><i data-lucide="history" class="mr-3"></i> HISTÓRICO GERAL</button>
            <button onclick="mudarTab('gerenciar')" id="btn-gerenciar" class="flex items-center w-full p-4 font-black italic text-xs hover:bg-gray-200 transition uppercase"><i data-lucide="users" class="mr-3"></i> GESTÃO INFLUENCERS</button>
            <button onclick="mudarTab('criar')" id="btn-criar" class="flex items-center w-full p-4 font-black italic text-xs hover:bg-gray-200 transition uppercase"><i data-lucide="user-plus" class="mr-3"></i> CRIAR ACESSO</button>
        </nav>
        <div class="p-4 border-4 border-black mt-4">
            <p class="tuf-title text-red-600 text-center">ADMIN MASTER</p>
        </div>
    </aside>

    <main class="flex-1 p-10 main-content">
        
        <div id="box-lancar" class="space-y-6">
            <div class="flex justify-between items-center">
                <h1 class="text-5xl tuf-title">LANÇAR <span class="text-red-600">VALORES</span></h1>
                <input type="date" id="data-global" class="tuf-input !w-48">
            </div>
            <div class="card-admin p-8">
                <label class="text-xs font-black uppercase mb-2 block italic">1. SELECIONAR INFLUENCER</label>
                <select id="select-influencer" class="tuf-input text-lg h-16" onchange="carregarAcordoParaLancamento()">
                    <option value="">-- SELECIONE --</option>
                </select>
                
                <div id="area-lancamento" class="mt-8 pt-8 border-t-4 border-black hidden">
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-6">
                        <div><label class="text-[10px] font-black uppercase">Registros</label><input type="number" id="val-reg" class="tuf-input" value="0"></div>
                        <div><label class="text-[10px] font-black uppercase">QFTD (CPA)</label><input type="number" id="val-qftd" class="tuf-input" value="0" oninput="autoCalculo()"></div>
                        <div class="bg-gray-100 p-4 border-2 border-black text-black">
                            <label class="text-[10px] font-black uppercase text-red-600 italic">CPA GERADO</label>
                            <input type="text" id="val-cpa-exib" class="tuf-input !border-red-600" readonly>
                        </div>
                    </div>
                    <div class="mt-8 flex items-center justify-between bg-black p-6">
                        <div class="text-white text-sm font-black italic uppercase">ACORDO ATUAL -> CPA: <span id="label-cpa" class="text-red-600">0</span></div>
                        <button onclick="salvarLancamento()" class="btn-tuf px-12">LANÇAR NO SISTEMA</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="box-gerenciar" class="hidden">
            <h1 class="text-5xl tuf-title mb-8">GESTÃO <span class="text-red-600">INFLU</span></h1>
            <div class="card-admin overflow-x-auto">
                <table class="w-full text-left font-black uppercase italic text-[10px]">
                    <thead class="bg-black text-white">
                        <tr>
                            <th class="p-4">NOME</th>
                            <th class="p-4 text-red-600">CPA (R$)</th>
                            <th class="p-4">BASE (R$)</th>
                            <th class="p-4">PAGAMENTO</th>
                            <th class="p-4">PIX</th>
                            <th class="p-4">AÇÃO</th>
                        </tr>
                    </thead>
                    <tbody id="lista-corpo"></tbody>
                </table>
            </div>
        </div>

        <div id="box-criar" class="hidden max-w-4xl">
            <h1 class="text-5xl tuf-title mb-8 text-red-600">NOVO ACESSO</h1>
            <div class="card-admin p-10 space-y-6">
                <div class="grid grid-cols-2 gap-6">
                    <div><label class="text-xs font-black italic">NOME DO INFLUENCER</label><input type="text" id="new-name" class="tuf-input"></div>
                    <div><label class="text-xs font-black italic">EMAIL (LOGIN)</label><input type="email" id="new-email" class="tuf-input"></div>
                    <div><label class="text-xs font-black italic">SENHA</label><input type="text" id="new-pass" class="tuf-input" value="tuf123"></div>
                    <div><label class="text-xs font-black italic text-red-600">VALOR CPA (R$)</label><input type="number" id="new-cpa" class="tuf-input" value="0"></div>
                    <div><label class="text-xs font-black italic text-red-600">VALOR BASE (R$)</label><input type="number" id="new-base" class="tuf-input" value="0"></div>
                    <div><label class="text-xs font-black italic">RECORRÊNCIA PAGAMENTO</label><input type="text" id="new-pag" class="tuf-input" placeholder="Ex: Toda Segunda"></div>
                    <div class="col-span-2"><label class="text-xs font-black italic">PIX PARA PAGAMENTO</label><input type="text" id="new-pix" class="tuf-input"></div>
                </div>
                <button onclick="salvarNovoInflu()" class="w-full btn-tuf">CADASTRAR E GERAR ACESSO</button>
            </div>
        </div>

        <div id="box-historico" class="hidden">...</div>

    </main>

    <script>
        // CONFIGURAÇÃO FIREBASE (Mesma sua)
        const firebaseConfig = { apiKey: "AIzaSyDcwuASd8wGkR9is1uFQwRjJKbatYE_wD0", authDomain: "tuf-v4.firebaseapp.com", databaseURL: "https://tuf-v4-default-rtdb.firebaseio.com", projectId: "tuf-v4", storageBucket: "tuf-v4.firebasestorage.app", messagingSenderId: "108777866240", appId: "1:108777866240:web:803141d1a15373223b44e5" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function authAdmin() {
            if(document.getElementById('admin-pass-input').value === "tuf2026") {
                sessionStorage.setItem('adminLogado', 'true');
                document.getElementById('login-screen').style.display = 'none';
                carregarDados();
            } else { alert("ACESSO NEGADO!"); }
        }

        if(sessionStorage.getItem('adminLogado') === 'true') document.getElementById('login-screen').style.display = 'none';

        document.getElementById('data-global').valueAsDate = new Date();
        let influsData = {};

        function carregarDados() {
            db.ref('usuarios').on('value', s => {
                const lista = document.getElementById('lista-corpo');
                const select = document.getElementById('select-influencer');
                lista.innerHTML = ''; 
                select.innerHTML = '<option value="">-- SELECIONE --</option>';
                
                if(!s.exists()) return;

                s.forEach(u => {
                    const d = u.val();
                    const key = u.key;
                    influsData[key] = d;
                    
                    lista.innerHTML += `
                        <tr class="border-b-4 border-black">
                            <td class="p-4 font-black text-red-600">${d.nome}</td>
                            <td class="p-4">R$ ${d.acordoCPA || 0}</td>
                            <td class="p-4">R$ ${d.base || 0}</td>
                            <td class="p-4">${d.pagamento || '---'}</td>
                            <td class="p-4 text-[8px]">${d.pix || '---'}</td>
                            <td class="p-4"><button onclick="excluirInflu('${key}')">🗑️</button></td>
                        </tr>`;
                    
                    select.innerHTML += `<option value="${key}">${d.nome.toUpperCase()}</option>`;
                });
            });
        }

        function salvarNovoInflu() {
            const email = document.getElementById('new-email').value.trim().toLowerCase();
            const key = email.replace(/\./g, '_').replace(/@/g, '_at_');
            
            const data = {
                nome: document.getElementById('new-name').value.trim(),
                loginExibicao: email,
                senha: document.getElementById('new-pass').value.trim(),
                acordoCPA: parseFloat(document.getElementById('new-cpa').value) || 0,
                base: parseFloat(document.getElementById('new-base').value) || 0, // NOVO
                pagamento: document.getElementById('new-pag').value.trim(), // NOVO
                pix: document.getElementById('new-pix').value || "Não informado"
            };

            if(!email || !data.nome) return alert("Preencha Nome e E-mail!");

            db.ref('usuarios/'+key).set(data).then(() => { 
                alert("INFLUENCER CADASTRADO COM SUCESSO!"); 
                mudarTab('gerenciar'); 
            });
        }

        // ... demais funções (mudarTab, lancar, etc) mantidas do seu código original
        function mudarTab(t) {
            ['lancar', 'historico', 'gerenciar', 'criar'].forEach(tab => {
                const el = document.getElementById('box-'+tab);
                if(el) el.classList.add('hidden');
                const btn = document.getElementById('btn-'+tab);
                if(btn) btn.classList.remove('tab-active');
            });
            document.getElementById('box-'+t).classList.remove('hidden');
            document.getElementById('btn-'+t).classList.add('tab-active');
            lucide.createIcons();
        }
        function carregarAcordoParaLancamento() {
            const id = document.getElementById('select-influencer').value;
            if(id && influsData[id]) {
                const ac = parseFloat(influsData[id].acordoCPA) || 0;
                document.getElementById('label-cpa').innerText = ac;
                document.getElementById('area-lancamento').classList.remove('hidden');
            }
        }
        function autoCalculo() {
            const q = parseInt(document.getElementById('val-qftd').value) || 0;
            const ac = parseFloat(document.getElementById('label-cpa').innerText) || 0;
            document.getElementById('val-cpa-exib').value = "R$ " + (q * ac).toFixed(2);
        }
        function salvarLancamento() {
            const id = document.getElementById('select-influencer').value;
            const data = document.getElementById('data-global').value;
            const qftd = parseInt(document.getElementById('val-qftd').value) || 0;
            const ac = parseFloat(document.getElementById('label-cpa').innerText) || 0;
            db.ref('usuarios/'+id+'/historico/'+data).update({
                registros: parseInt(document.getElementById('val-reg').value) || 0,
                qftd: qftd,
                cpa: qftd * ac
            }).then(() => alert("LANÇADO!"));
        }
        function excluirInflu(id) { if(confirm("APAGAR?")) db.ref('usuarios/'+id).remove(); }
        
        carregarDados();
        lucide.createIcons();
    </script>
</body>
</html>
